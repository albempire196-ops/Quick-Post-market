<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
    <meta name="theme-color" content="#6c3aed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Quick Post Market" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png" />
    <link rel="icon" type="image/png" href="/pwa-icon-192.png" />
    <link rel="canonical" href="https://quickpostmarket.com/" />

    <title>Quick Post Market — Buy, Sell & Advertise Anything Instantly | Free Online Marketplace</title>

    <meta name="description" content="Quick Post Market is the fastest free online marketplace to buy, sell and advertise products, hotels, restaurants, shops and services. Post listings in seconds — no account needed. Find great deals near you." />
    <meta name="keywords" content="marketplace, buy and sell, free listings, advertise business, sell online, post products, hotel advertising, restaurant promotion, shop listing, online store, quick marketplace, free marketplace, sell anything" />
    <meta name="author" content="Quick Post Market" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Quick Post Market" />
    <meta property="og:title" content="Quick Post Market — Buy, Sell & Advertise Anything Instantly" />
    <meta property="og:description" content="The fastest free marketplace to list products, advertise your business — hotels, restaurants, shops & more. Post in seconds, find deals near you." />
    <meta property="og:url" content="https://quickpostmarket.com/" />
    <meta property="og:image" content="https://quickpostmarket.com/pwa-icon-192.png" />
    <meta property="og:image:width" content="192" />
    <meta property="og:image:height" content="192" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quick Post Market — Buy, Sell & Advertise Anything Instantly" />
    <meta name="twitter:description" content="The fastest free marketplace to list products, advertise your business — hotels, restaurants, shops & more. Post in seconds, find deals near you." />
    <meta name="twitter:image" content="https://quickpostmarket.com/pwa-icon-192.png" />

    <!-- Structured Data - WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Quick Post Market",
      "url": "https://quickpostmarket.com/",
      "description": "The fastest free online marketplace to buy, sell and advertise products, businesses, hotels, restaurants, shops and services.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://quickpostmarket.com/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Quick Post Market",
      "url": "https://quickpostmarket.com/",
      "logo": "https://quickpostmarket.com/pwa-icon-192.png",
      "sameAs": []
    }
    </script>

    <!-- Structured Data - WebApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Quick Post Market",
      "url": "https://quickpostmarket.com/",
      "applicationCategory": "ShoppingApplication",
      "operatingSystem": "All",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Free online marketplace to buy, sell and advertise anything — products, hotels, restaurants, shops and services. Post listings in seconds."
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
